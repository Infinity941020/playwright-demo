name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Restore Playwright Browser Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run UI Tests
        run: npx playwright test tests/ui

      - name: Upload UI Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-artifacts
          path: |
            playwright-report
            test-results
          retention-days: 7

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Restore Playwright Browser Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run API Tests
        run: npx playwright test tests/api

      - name: Upload API Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-artifacts
          path: |
            playwright-report
            test-results
          retention-days: 7

  visual-tests:
    name: Visual Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Restore Playwright Browser Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Visual Tests
        run: npx playwright test tests/visual

      - name: Upload Visual Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-artifacts
          path: |
            playwright-report
            test-results
            tests/visual/__snapshots__
          retention-days: 7

  notify:
    name: Slack Notification
    runs-on: ubuntu-latest

    needs:
      - ui-tests
      - api-tests
      - visual-tests

    if: always()

    steps:
      - name: Send Slack Notification
        run: |
          if [[ "${{ needs.ui-tests.result }}" == "failure" || \
                "${{ needs.api-tests.result }}" == "failure" || \
                "${{ needs.visual-tests.result }}" == "failure" ]]; then
            STATUS="❌ Playwright CI Failed"
          else
            STATUS="✅ Playwright CI Success"
          fi

          cat > payload.json <<EOF
          {
            "text": "${STATUS}\n\nRepository: ${{ github.repository }}\n\nBranch: ${{ github.ref_name }}\n\nTriggered By: ${{ github.actor }}\n\nResults:\nUI Tests: ${{ needs.ui-tests.result }}\nAPI Tests: ${{ needs.api-tests.result }}\nVisual Tests: ${{ needs.visual-tests.result }}\n\nWorkflow:\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF

          curl -X POST \
            -H "Content-type: application/json" \
            --data @payload.json \
            ${{ secrets.SLACK_WEBHOOK_URL }}